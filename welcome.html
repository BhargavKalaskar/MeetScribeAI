<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Welcome to Meet Summarizer</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      margin: 0;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    h1 { color: #166534; margin-bottom: 10px; }
    p { color: #4b5563; margin-bottom: 30px; line-height: 1.5; }
    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .btn:hover { background: #1d4ed8; transform: scale(1.02); }
    .google-icon { background: white; padding: 5px; border-radius: 50%; width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome! 👋</h1>
    <p>To start generating AI summaries for your meetings, we need to connect your Google Account securely.</p>
    
    <button id="loginBtn" class="btn">
      <span>🚀 Sign in with Google</span>
    </button>
    
    <p id="status" style="margin-top: 20px; font-size: 14px; color: #6b7280;"></p>
  </div>
  <script src="welcome.js"></script>
</body>
</html>
