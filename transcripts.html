<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --border: #e5e7eb;
      --text-main: #111827;
      --text-muted: #6b7280;
      --primary: #000000;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.02em;
    }

    /* Main Container */
    .container {
      width: 100%;
      max-width: 800px; /* Reduced width slightly for better readability */
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .page-header {
      margin-bottom: 8px;
    }

    h2 { font-size: 24px; font-weight: 700; color: var(--text-main); }
    .subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

    /* === NEW BANNER STYLE (Top Card) === */
    .promo-banner {
      background: linear-gradient(135deg, #111827 0%, #000000 100%); /* Dark/Premium Look */
      border-radius: 12px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .promo-content {
      flex: 1;
      padding-right: 20px;
    }

    .promo-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .promo-text {
      font-size: 13px;
      line-height: 1.5;
      color: #9ca3af; /* Light gray for contrast on dark bg */
      max-width: 500px;
    }

    .btn-cta {
      background: white;
      color: black;
      font-weight: 600;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      white-space: nowrap;
      transition: transform 0.1s;
    }
    .btn-cta:hover { transform: translateY(-1px); box-shadow: 0 2px 4px rgba(255,255,255,0.1); }

    /* Transcript Card */
    .transcript-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .card-date { font-size: 13px; color: var(--text-muted); }

    .raw-preview {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.6;
      background: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px dashed var(--border);
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: white;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-main);
      transition: background 0.1s;
    }
    .btn-sm:hover { background: #f3f4f6; }
    
    .btn-delete:hover { background: #fef2f2; color: var(--danger); border-color: #fecaca; }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px; color: var(--text-muted); }

    @media (max-width: 600px) {
      .promo-banner { flex-direction: column; align-items: flex-start; gap: 16px; }
      .btn-cta { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">📝 MeetScribeAI</div>
    <button id="clearAll" class="btn-sm" style="color: #ef4444; border-color: #e5e7eb;">Clear History</button>
  </nav>

  <div class="container">
    
    <div class="page-header">
      <h2>Local History</h2>
      <div class="subtitle">Recent meetings captured on this device</div>
    </div>

    <div class="promo-banner">
      <div class="promo-content">
        <div class="promo-title">✨ Want the full AI Summary?</div>
        <div class="promo-text">
          This page only stores raw text. To view the <strong>Executive Summary</strong>, <strong>Action Items</strong>, and <strong>Decisions</strong>, check your main dashboard.
        </div>
      </div>
      <a href="#" id="dashboardLink" class="btn-cta">
        Go to Dashboard &rarr;
      </a>
    </div>

    <div id="transcriptList">
      </div>

  </div>

  <script src="config.js"></script>
  <script src="api-helpers.js"></script>
  <script src="transcripts.js"></script>
</body>
</html>
